
    <!DOCTYPE html>
    <html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Stock Backtest Elite Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --bg: #0f172a;
                --card-bg: #1e293b;
                --primary: #fbbf24;
                --text: #f8fafc;
                --text-dim: #94a3b8;
                --success: #10b981;
                --danger: #ef4444;
            }
            body {
                font-family: 'Inter', sans-serif;
                background-color: var(--bg);
                color: var(--text);
                margin: 0;
                padding: 40px 20px;
                line-height: 1.6;
            }
            .container {
                max-width: 1100px;
                margin: 0 auto;
            }
            header {
                text-align: center;
                margin-bottom: 50px;
            }
            h1 {
                font-family: 'Outfit', sans-serif;
                font-size: 3rem;
                margin-bottom: 10px;
                background: linear-gradient(90deg, #fbbf24, #f59e0b);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .stats-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin-bottom: 40px;
            }
            .stat-card {
                background: var(--card-bg);
                padding: 25px;
                border-radius: 20px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                box-shadow: 0 10px 25px rgba(0,0,0,0.2);
                transition: transform 0.3s ease;
            }
            .stat-card:hover { transform: translateY(-5px); }
            .stat-label { color: var(--text-dim); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; }
            .stat-value { font-size: 2rem; font-weight: 800; font-family: 'Outfit'; margin-top: 5px; }
            .chart-container {
                background: var(--card-bg);
                padding: 30px;
                border-radius: 24px;
                margin-bottom: 40px;
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .keyword-table {
                width: 100%;
                border-collapse: collapse;
                background: var(--card-bg);
                border-radius: 20px;
                overflow: hidden;
            }
            .keyword-table th, .keyword-table td {
                padding: 15px 20px;
                text-align: left;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }
            .keyword-table th { background: rgba(255,255,255,0.05); color: var(--text-dim); }
            .trend-up { color: var(--success); }
            .trend-down { color: var(--danger); }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Elite Backtest Report</h1>
                <p style="color: var(--text-dim)">日本のトップ銘柄に対する過去10年間のエリート厳選戦略の成果</p>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">利益因子 (PF)</div>
                    <div class="stat-value" style="color: var(--primary)">3.01</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">勝率</div>
                    <div class="stat-value">66.7%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">精鋭トレード数</div>
                    <div class="stat-value">3回</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">累計利益</div>
                    <div class="stat-value" style="color: var(--success)">+139円</div>
                </div>
            </div>

            <div class="chart-container">
                <h2 style="margin-top: 0; font-family: 'Outfit'">資産成長カーブ</h2>
                <canvas id="profitChart" height="120"></canvas>
            </div>

            <div class="chart-container">
                <h2 style="margin-top: 0; font-family: 'Outfit'">キーワード別勝率ランキング</h2>
                <table class="keyword-table">
                    <thead>
                        <tr>
                            <th>キーワード</th>
                            <th>回数</th>
                            <th>平均利益率</th>
                            <th>勝率</th>
                            <th>累計損益</th>
                        </tr>
                    </thead>
                    <tbody id="keyword-list">
                    </tbody>
                </table>
            </div>
        </div>

        <script>
            // 資産グラフ
            const ctx = document.getElementById('profitChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ["スタート", "8001.T - その他", "8058.T - その他", "7203.T - その他"],
                    datasets: [{
                        label: '累積損益 (円)',
                        data: [0, 97.68576049804688, 28.434783935546875, 139.42404174804688],
                        borderColor: '#fbbf24',
                        backgroundColor: 'rgba(251, 191, 36, 0.1)',
                        borderWidth: 4,
                        fill: true,
                        tension: 0.1,
                        pointRadius: 6,
                        pointBackgroundColor: '#fbbf24'
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { display: false } }
                    }
                }
            });

            // キーワード表
            const kwData = [{"Hit_Keyword": "その他", "トレード回数": 3, "平均利益率(%)": 0.5010156737280114, "勝率(%)": 66.66666666666666, "累計利益(円)": 139.42404174804688}];
            const tableBody = document.getElementById('keyword-list');
            kwData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight: 700;">${row.Hit_Keyword}</td>
                    <td>${row['トレード回数']}</td>
                    <td class="${row['平均利益率(%)'] >= 0 ? 'trend-up' : 'trend-down'}">${row['平均利益率(%)'].toFixed(2)}%</td>
                    <td>${row['勝率(%)'].toFixed(1)}%</td>
                    <td class="${row['累計利益(円)'] >= 0 ? 'trend-up' : 'trend-down'}">${row['累計利益(円)'].toLocaleString()}円</td>
                `;
                tableBody.appendChild(tr);
            });
        </script>
    </body>
    </html>
