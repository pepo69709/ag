name: Daily Stock Scan & Portfolio Patrol

on:
  schedule:
    # 毎日日本時間 16:05 (UTC 07:05) に実行
    - cron: '5 7 * * *'
  workflow_dispatch: # 手動で実行したい時用

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v3

    - name: Pythonをセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ライブラリをインストール
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: スキャンを実行
      env:
        # トークンやWebhook URLを安全に扱う
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python scanner.py
