name: Daily Stock Scan & Portfolio Patrol

on:
  schedule:
    # 毎日日本時間 09:00〜15:30 の間、30分おきに自動実行 (UTC 00:00〜06:30)
    - cron: '*/30 0-6 * * *'
  workflow_dispatch: # 手動実行ボタンも残します

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v3

    - name: Pythonをセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ライブラリをインストール
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: スキャンを実行
      env:
        # トークンやWebhook URLを安全に扱う
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python scanner.py
