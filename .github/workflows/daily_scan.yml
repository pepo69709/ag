name: Daily Stock Scan & Portfolio Patrol

on:
  schedule:
    # 毎日日本時間 09:00〜15:30 の間、15分おきに超速パトロール (UTC 00:00〜06:30)
    - cron: '*/15 0-6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v3

    - name: Pythonをセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ライブラリをインストール
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: スキャンを実行
      env:
        # 名前を scanner.py が探している "DISCORD_WEBHOOK_URL" に正確に合わせます
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python scanner.py
