name: Daily Stock Scan & Portfolio Patrol

on:
  schedule:
    # 毎日日本時間 09:00〜15:30 の間、15分おきに超速パトロール (UTC 00:00〜06:30)
    - cron: '*/15 0-6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v3

    - name: Pythonをセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ライブラリをインストール
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: スキャンを実行
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python scanner.py

    - name: データをリポジトリに保存して蓄積
      run: |
        git config --global user.name "Stock Bot AI"
        git config --global user.email "bot-ai@example.com"
        git add trade_tracker.csv
        git commit -m "📊 トレード履歴と判定結果を追跡・更新" || echo "追加するデータがありませんでした"
        git push
