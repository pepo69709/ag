name: AI Stock Patrol

on:
  schedule:
    # 毎日 平日の日本時間 9:00〜15:00 まで実行 (UTC 0:00-6:00)
    # 9:00(UTC 0:00)と9:30(UTC 0:30)
    - cron: '0 0 * * 1-5'
    - cron: '30 0,1,2,3,4,5 * * 1-5'
    # 15:00(UTC 6:00)
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # 手動実行ボタンも残す

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 👈 これが超重要！記録を保存するための権限です。

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas joblib requests xgboost lightgbm scikit-learn

      - name: Run AI Scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scanner.py

      - name: Save Records
        run: |
          git config --global user.name "AI Patrol Bot"
          git config --global user.email "bot@example.com"
          git add trade_tracker.csv index.html
          git commit -m "📊 Automatic update: AI Patrol Results $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin main || echo "Push failed, but continuing..."
