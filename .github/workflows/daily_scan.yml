name: Daily Stock Scan & Portfolio Patrol

on:
  schedule:
    # 日本時間 (JST) 月曜〜金曜 の 09:00 〜 15:30 ごろにパトロール
    - cron: '*/30 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: コードをチェックアウト
      uses: actions/checkout@v3

    - name: Pythonをセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: ライブラリをインストール
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: スキャンを実行
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python scanner.py

    - name: データをリポジトリに保存して蓄積
      run: |
        git config --global user.name "Stock Bot AI"
        git config --global user.email "bot-ai@example.com"
        # ファイルが存在し、かつ変更がある場合のみ実行
        if [ -f trade_tracker.csv ] && [ -n "$(git status --porcelain trade_tracker.csv)" ]; then
          git add trade_tracker.csv
          git commit -m "📊 トレード履歴と判定結果を追跡・更新"
          git pull --rebase origin main
          git push origin main
        else
          echo "保存するデータ(変更)がありませんでした。スキップします。"
        fi
