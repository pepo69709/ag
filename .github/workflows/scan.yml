name: Sniper Cloud Scanner
on:
  schedule:
    - cron: '0 0-6 * * 1-5'
  repository_dispatch:
    types: [gas_trigger]

  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance lightgbm scikit-learn requests
      - name: Run Sniper Scan
        env:
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python cloud_scan.py

      - name: Commit and Push CSV
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add latest_signals.csv || echo "No changes to commit"
          git commit -m "Update scan results: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push

