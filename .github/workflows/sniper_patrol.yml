name: Sniper AI Cloud Patrol

on:
  schedule:
    # 日本時間 08:50 (UTC 23:50) に毎日（月〜金）自動起動
    - cron: '50 23 * * 0-4'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn joblib lightgbm requests

      - name: Run Sniper Patrol
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: python auto_patrol.py
