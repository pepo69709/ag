name: Sniper AI Cloud Patrol

on:
  schedule:
    # 日本時間 月曜〜金曜 08:50 (世界標準時 日曜〜木曜 23:50)
    - cron: '50 23 * * SUN-THU'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scikit-learn joblib lightgbm requests

      - name: Run Sniper Patrol
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: python auto_patrol.py
