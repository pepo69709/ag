name: Sniper AI Patrol (Clean Slate)

on:
  schedule:
    - cron: '*/5 0-6 * * SUN-THU'
    - cron: '50 23 * * SUN-THU'
  workflow_dispatch:

jobs:
  patrol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      - name: Run Sniper Patrol
        env:
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: |
          git config --global user.name "SniperAI-Clean"
          git config --global user.email "ai@example.com"
          python bot.py
          git add database.csv
          git commit -m "Auto: Update database.csv" || echo "No changes"
          git push origin main || echo "Push skipped"
