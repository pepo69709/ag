<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sniper AI | Command Center</title>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <div class="logo">Sniper AI <span style="font-size: 0.6rem; vertical-align: middle;">V3.0</span></div>
            <div class="market-status">
                <span class="status-badge bull" id="regime-badge">📈 BULL MARKET</span>
                <span class="status-badge" id="n225-val">N225: 53,373</span>
                <span id="sync-status" style="font-size: 0.7rem; color: var(--text-dim); margin-left:10px;">LATEST SCAN: --:--</span>
                <button onclick="loadData()" class="refresh-btn">🔄 REFRESH</button>
            </div>
        </header>

        <!-- LEFT NAV: AI SCAN RESULTS -->
        <nav id="ticker-list">
            <div class="section-title">AI Scanned Targets</div>
            <!-- Cards will be injected by JS -->
        </nav>

        <!-- MAIN VIEW: ANALYTICS -->
        <main>
            <div id="detail-pane" class="detail-view">
                <div class="section-title">Asset Insights</div>
                <h1 id="detail-symbol">1801.T</h1>
                <div class="price-main">¥ 5,420</div>

                <div class="grid-stats">
                    <div class="stat-box">
                        <div class="stat-label">RSI (14)</div>
                        <div class="stat-value" id="val-rsi">38.2</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Volatility (Sigma)</div>
                        <div class="stat-value" id="val-sigma">1.82%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Deviation (Kairi)</div>
                        <div class="stat-value" id="val-kairi">-2.1%</div>
                    </div>
                </div>

                <div style="margin-top: 40px;">
                    <button onclick="recordTrade()">この銘柄をスナイプ（記録保存）</button>
                </div>
            </div>
        </main>

        <!-- RIGHT SIDEBAR: PORTFOLIO -->
        <aside>
            <div class="section-title">Active Portfolio</div>
            <div id="portfolio-list">
                <div class="portfolio-card">
                    <div style="display: flex; justify-content: space-between;">
                        <span style="font-weight: bold;">Mitsubishi Corp (8058)</span>
                        <span style="color: var(--accent-green);">+2.4%</span>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-dim);">Avg: ¥ 3,120 | Last: ¥ 3,195</div>
                </div>
            </div>

            <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
                    <span>Total Value (評価額)</span>
                    <span id="total-equity-val" style="color: var(--accent-gold); font-weight: bold;">¥ 0</span>
                </div>
            </div>
        </aside>
    </div>

    <script>
        let portfolioData = [];
        let currentData = [];

        async function loadData() {
            try {
                // Load Targets
                const response = await fetch('database.csv');
                const csvText = await response.text();
                const lines = csvText.trim().split('\n');
                const headers = lines[0].split(',');

                currentData = lines.slice(1).map(line => {
                    const values = line.split(',');
                    let obj = {};
                    headers.forEach((header, i) => obj[header.trim()] = values[i]);
                    return obj;
                });

                // Load Portfolio
                await loadPortfolio();

                // Update Sync Status with the CSV's timestamp
                const latestTime = currentData.length > 0 ? currentData[0].update_time : "Unknown";
                document.getElementById('sync-status').innerText = `LATEST SCAN: ${latestTime}`;
                document.getElementById('sync-status').style.color = "#4fd1c5"; // Greenish
                setTimeout(() => { document.getElementById('sync-status').style.color = "var(--text-dim)"; }, 1000);

                // 🔥 Restore missing rendering calls
                renderTickerList(currentData);
                if (currentData.length > 0) {
                    showDetail(currentData[0].ticker);
                }
            } catch (e) {
                console.error("Error loading CSV:", e);
            }
        }

        async function loadPortfolio() {
            try {
                const response = await fetch('portfolio.csv');
                const csvText = await response.text();
                const lines = csvText.trim().split('\n');
                const headers = lines[0].split(',');

                portfolioData = lines.slice(1).map(line => {
                    const values = line.split(',');
                    let obj = {};
                    headers.forEach((header, i) => obj[header] = values[i]);
                    return obj;
                });

                renderPortfolio();
            } catch (e) {
                console.log("No portfolio found.");
            }
        }

        function renderPortfolio() {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = '';
            let totalEquity = 0;

            portfolioData.forEach(item => {
                const current = currentData.find(d => d.ticker === item.ticker);
                const curPrice = current ? parseFloat(current.price) : parseFloat(item.entry_price);
                const entryPrice = parseFloat(item.entry_price);
                const diff = ((curPrice / entryPrice - 1) * 100).toFixed(1);
                const color = diff >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';

                totalEquity += curPrice * parseInt(item.quantity);

                const card = document.createElement('div');
                card.className = 'portfolio-card';
                card.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: bold;">${item.ticker}</span>
                        <div style="text-align: right;">
                            <span style="color: ${color}; display: block; font-weight: 800;">${diff > 0 ? '+' : ''}${diff}%</span>
                            <button onclick="sellPosition('${item.ticker}')" style="font-size: 0.6rem; padding: 2px 5px; margin-top: 5px; background: var(--accent-red); color: white; width: auto;">SELL</button>
                        </div>
                    </div>
                    <div style="font-size: 0.8rem; color: var(--text-dim); margin-top: 5px;">
                        Avg: ¥ ${entryPrice.toLocaleString()} | Last: ¥ ${curPrice.toLocaleString()}
                    </div>
                `;
                list.appendChild(card);
            });

            document.getElementById('total-equity-val').innerText = `¥ ${totalEquity.toLocaleString()}`;
        }

        async function sellPosition(ticker) {
            if (!confirm(`${ticker} を売却（リストから削除）しますか？`)) return;

            const response = await fetch('/api/sell', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ticker })
            });

            if (response.ok) {
                alert(`${ticker} の売却を記録しました！`);
                loadPortfolio();
            }
        }

        function renderTickerList(data) {
            const list = document.getElementById('ticker-list');
            list.innerHTML = '<div class="section-title">AI Scanned Targets</div>';

            data.forEach(item => {
                const isDefense = ["1357.T", "1459.T"].includes(item.ticker);
                const card = document.createElement('div');
                card.className = 'ticker-card';
                card.onclick = () => showDetail(item.ticker);
                card.id = `card-${item.ticker}`;
                card.innerHTML = `
                    <div class="ticker-header">
                        <span class="ticker-symbol">${item.ticker} ${isDefense ? '<span class="defense-label">🛡️DEFENSE</span>' : ''}</span>
                        <span class="ticker-score">Score: ${item.score}</span>
                    </div>
                    <div class="ticker-stars">${item.stars}</div>
                `;
                list.appendChild(card);
            });
        }

        function showDetail(ticker) {
            const item = currentData.find(d => d.ticker === ticker);
            if (!item) return;

            const isDefense = ["1357.T", "1459.T"].includes(item.ticker);

            // Update Active State
            document.querySelectorAll('.ticker-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${ticker}`).classList.add('active');

            // Update Pane
            document.getElementById('detail-symbol').innerHTML = `${item.ticker} ${isDefense ? '<span class="status-badge" style="border-color: var(--accent-gold); color: var(--accent-gold); vertical-align: middle; margin-left: 15px;">🛡️ BEAR DEFENSE</span>' : ''}`;
            document.querySelector('.price-main').innerText = `¥ ${item.price}`;
            document.getElementById('val-rsi').innerText = item.rsi;
            document.getElementById('val-sigma').innerText = `${item.sigma}%`;
            document.getElementById('val-kairi').innerText = `${item.kairi}%`;
        }

        async function recordTrade() {
            const ticker = document.getElementById('detail-symbol').innerText.split(' ')[0];
            const price = document.querySelector('.price-main').innerText.replace('¥ ', '').replace(',', '');
            const quantity = prompt(`${ticker} の購入株数を入力してください（例: 100）`, "100");

            if (!quantity) return;

            const response = await fetch('/api/record', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ticker, price, quantity })
            });

            if (response.ok) {
                alert(`${ticker} をスナイプ記録に保存しました！なのだ！🥇🦾✨`);
                loadPortfolio(); // Reload UI
            } else {
                alert("エラーが発生しました。");
            }
        }

        loadData();
        setInterval(loadData, 30000); // 30秒ごとに自動更新に変更！
    </script>
</body>

</html>
